<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Attendance</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openClockInModal()">Clock In Worker</button>
        <button class="btn btn-ghost btn-sm"   onclick="openAbsentModal()">Mark Absent</button>
      </div>
    </header>
    <main class="page-content">
      <!-- Today snapshot tabs by branch -->
      <div class="card" style="margin-bottom:20px;">
        <div class="card-header">
          <h3 class="card-title">Today's Snapshot</h3>
          <select id="today-branch" class="form-control form-control-sm" onchange="loadToday()" style="max-width:200px">
            <option value="">Select Branch</option>
          </select>
        </div>
        <div id="today-content" class="card-body p-0">
          <div class="empty-state">Select a branch to view today's attendance</div>
        </div>
      </div>

      <!-- History -->
      <div class="card">
        <div class="card-header filter-bar">
          <h3 class="card-title" style="flex-shrink:0">History</h3>
          <select id="h-branch" class="form-control form-control-sm" onchange="loadHistory(1)"><option value="">All Branches</option></select>
          <select id="h-status" class="form-control form-control-sm" onchange="loadHistory(1)">
            <option value="">All Status</option>
            <option value="present">Present</option>
            <option value="late">Late</option>
            <option value="absent">Absent</option>
            <option value="off_day">Off Day</option>
          </select>
          <input id="h-from" class="form-control form-control-sm" type="date" onchange="loadHistory(1)">
          <input id="h-to"   class="form-control form-control-sm" type="date" onchange="loadHistory(1)">
        </div>
        <div id="history-table" class="card-body p-0"></div>
        <div id="history-pagination" class="card-footer"></div>
      </div>
    </main>
  </div>
</div>

<!-- Clock In Modal -->
<div id="clockin-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 class="modal-title">Clock In Worker</h3>
      <button class="btn btn-icon btn-ghost" onclick="closeModal('clockin-modal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Search Worker</label>
        <input id="ci-search" class="form-control" type="text" placeholder="Name or phone…" oninput="searchWorkersCi()">
        <div id="ci-results" class="search-dropdown"></div>
        <input type="hidden" id="ci-worker-id">
        <div id="ci-worker-name" class="text-muted text-sm" style="margin-top:4px;"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input id="ci-date" class="form-control" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">Clock In Time (leave blank = now)</label>
          <input id="ci-time" class="form-control" type="time">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <input id="ci-notes" class="form-control" type="text">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('clockin-modal')">Cancel</button>
      <button class="btn btn-primary" id="ci-btn" onclick="doClockIn()">Clock In</button>
    </div>
  </div>
</div>

<!-- Mark Absent Modal -->
<div id="absent-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 class="modal-title">Mark Workers Absent</h3>
      <button class="btn btn-icon btn-ghost" onclick="closeModal('absent-modal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input id="ab-date" class="form-control" type="date">
      </div>
      <div class="form-group">
        <label class="form-label">Branch</label>
        <select id="ab-branch" class="form-control" onchange="loadAbsentWorkers()"><option value="">Select Branch</option></select>
      </div>
      <div id="ab-workers-list" class="workers-check-list"></div>
      <div class="form-group" style="margin-top:12px">
        <label class="form-label">Notes (optional)</label>
        <input id="ab-notes" class="form-control" type="text">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('absent-modal')">Cancel</button>
      <button class="btn btn-danger" id="ab-btn" onclick="doMarkAbsent()">Mark Absent</button>
    </div>
  </div>
</div>

<!-- Clock Out Modal -->
<div id="clockout-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 class="modal-title">Clock Out Worker</h3>
      <button class="btn btn-icon btn-ghost" onclick="closeModal('clockout-modal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="co-worker-id">
      <div id="co-worker-name" class="fw-600" style="margin-bottom:12px;"></div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date</label>
          <input id="co-date" class="form-control" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">Clock Out Time (blank = now)</label>
          <input id="co-time" class="form-control" type="time">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('clockout-modal')">Cancel</button>
      <button class="btn btn-primary" id="co-btn" onclick="doClockOut()">Clock Out</button>
    </div>
  </div>
</div>

<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  const today = new Date().toISOString().split('T')[0];

  async function loadToday() {
    const branchId = document.getElementById('today-branch').value;
    if (!branchId) return;
    try {
      const data = await API.attendance.today(branchId);
      const s = data.summary;
      const summaryHtml = `<div class="att-summary"><span class="badge badge-green">Present: ${s.present}</span><span class="badge badge-amber">Late: ${s.late}</span><span class="badge badge-red">Absent: ${s.absent}</span><span class="badge badge-gray">Off Day: ${s.offDay}</span></div>`;
      const rows = (data.workers || []).map(w => `
        <tr>
          <td>
            <div class="worker-cell">
              ${workerAvatar(w)}
              <div class="worker-name">${w.fullName}</div>
            </div>
          </td>
          <td>${statusBadge(w.status)}</td>
          <td>${w.clockIn ? formatTime(w.clockIn) : '—'}</td>
          <td>${w.clockOut ? formatTime(w.clockOut) : '—'}</td>
          <td>${w.latenessMinutes ? formatMinutes(w.latenessMinutes) : '—'}</td>
          <td>
            ${w.status === 'absent' || w.status === 'off_day' ? `<button class="btn btn-success btn-xs" onclick="openClockInForWorker('${w._id}','${w.fullName}')">Clock In</button>` : ''}
            ${(w.status === 'present' || w.status === 'late') && !w.clockOut ? `<button class="btn btn-ghost btn-xs" onclick="openClockOutForWorker('${w._id}','${w.fullName}')">Clock Out</button>` : ''}
          </td>
        </tr>`).join('');
      document.getElementById('today-content').innerHTML = summaryHtml + `<table class="table"><thead><tr><th>Worker</th><th>Status</th><th>In</th><th>Out</th><th>Late</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
    } catch(e) { showToast(e.message, 'error'); }
  }

  let histPage = 1;
  async function loadHistory(p = 1) {
    histPage = p;
    const from = document.getElementById('h-from').value || '';
    const to   = document.getElementById('h-to').value   || '';
    if (!from) {
      const d = new Date(); d.setDate(1);
      document.getElementById('h-from').value = d.toISOString().split('T')[0];
      document.getElementById('h-to').value   = today;
    }
    const params = {
      branch: document.getElementById('h-branch').value,
      status: document.getElementById('h-status').value,
      from: document.getElementById('h-from').value,
      to:   document.getElementById('h-to').value,
      page: histPage, limit: 30
    };
    Object.keys(params).forEach(k => !params[k] && delete params[k]);
    try {
      const data = await API.attendance.list(params);
      const rows = (data.attendance || []).map(a => `
        <tr>
          <td>
            <div class="worker-cell">
              ${workerAvatar(a.worker)}
              <div class="worker-name">${a.worker?.fullName || '—'}</div>
            </div>
          </td>
          <td>${a.branch?.name || '—'}</td>
          <td>${formatDate(a.date)}</td>
          <td>${statusBadge(a.status)}</td>
          <td>${a.clockInTime ? formatTime(a.clockInTime) : '—'}</td>
          <td>${a.clockOutTime ? formatTime(a.clockOutTime) : '—'}</td>
          <td>${a.latenessMinutes ? formatMinutes(a.latenessMinutes) : '—'}</td>
        </tr>`).join('');
      document.getElementById('history-table').innerHTML = rows ? `<table class="table"><thead><tr><th>Worker</th><th>Branch</th><th>Date</th><th>Status</th><th>In</th><th>Out</th><th>Late</th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">No records found</div>';
      renderPagination('history-pagination', histPage, data.pages, 'loadHistory');
    } catch(e) { showToast(e.message, 'error'); }
  }

  // Clock In
  function openClockInModal() {
    document.getElementById('ci-worker-id').value = '';
    document.getElementById('ci-worker-name').textContent = '';
    document.getElementById('ci-search').value = '';
    document.getElementById('ci-results').innerHTML = '';
    document.getElementById('ci-date').value = today;
    document.getElementById('ci-time').value = '';
    document.getElementById('ci-notes').value = '';
    document.getElementById('clockin-modal').style.display = 'flex';
  }
  function openClockInForWorker(id, name) {
    openClockInModal();
    document.getElementById('ci-worker-id').value = id;
    document.getElementById('ci-worker-name').textContent = '→ ' + name;
    document.getElementById('ci-search').value = name;
  }

  const searchWorkersCi = debounce(async () => {
    const q = document.getElementById('ci-search').value.trim();
    if (q.length < 2) { document.getElementById('ci-results').innerHTML = ''; return; }
    try {
      const data = await API.workers.search(q);
      const html = (data.workers || []).map(w => `<div class="dropdown-item" onclick="selectWorkerCi('${w._id}','${w.fullName.replace(/'/g,"\\'")}')">
        ${workerAvatar(w)} <span>${w.fullName}</span> <span class="text-muted text-sm">${w.branch?.name || ''}</span></div>`).join('');
      document.getElementById('ci-results').innerHTML = html || '<div class="dropdown-empty">No workers found</div>';
    } catch(e) {}
  });
  function selectWorkerCi(id, name) {
    document.getElementById('ci-worker-id').value = id;
    document.getElementById('ci-worker-name').textContent = '→ ' + name;
    document.getElementById('ci-results').innerHTML = '';
    document.getElementById('ci-search').value = name;
  }

  async function doClockIn() {
    const workerId = document.getElementById('ci-worker-id').value;
    if (!workerId) return showToast('Select a worker', 'warning');
    const btn = document.getElementById('ci-btn');
    btn.disabled = true;
    try {
      await API.attendance.clockIn({ workerId, date: document.getElementById('ci-date').value, clockInTime: document.getElementById('ci-time').value || null, notes: document.getElementById('ci-notes').value });
      showToast('Clocked in!', 'success');
      closeModal('clockin-modal');
      loadToday();
    } catch(e) { showToast(e.message, 'error'); }
    btn.disabled = false;
  }

  // Clock Out
  function openClockOutForWorker(id, name) {
    document.getElementById('co-worker-id').value = id;
    document.getElementById('co-worker-name').textContent = name;
    document.getElementById('co-date').value = today;
    document.getElementById('co-time').value = '';
    document.getElementById('clockout-modal').style.display = 'flex';
  }
  async function doClockOut() {
    const workerId = document.getElementById('co-worker-id').value;
    const btn = document.getElementById('co-btn');
    btn.disabled = true;
    try {
      await API.attendance.clockOut({ workerId, date: document.getElementById('co-date').value, clockOutTime: document.getElementById('co-time').value || null });
      showToast('Clocked out!', 'success');
      closeModal('clockout-modal');
      loadToday();
    } catch(e) { showToast(e.message, 'error'); }
    btn.disabled = false;
  }

  // Mark Absent
  function openAbsentModal() {
    document.getElementById('ab-date').value = today;
    document.getElementById('absent-modal').style.display = 'flex';
  }
  async function loadAbsentWorkers() {
    const branchId = document.getElementById('ab-branch').value;
    if (!branchId) return;
    try {
      const data = await API.workers.list({ branch: branchId, status: 'active', limit: 100 });
      document.getElementById('ab-workers-list').innerHTML = (data.workers || []).map(w => `
        <label class="worker-check-item">
          <input type="checkbox" value="${w._id}" class="ab-worker-cb"> ${w.fullName}
        </label>`).join('') || '<div class="text-muted text-sm">No active workers</div>';
    } catch(e) {}
  }
  async function doMarkAbsent() {
    const workerIds = [...document.querySelectorAll('.ab-worker-cb:checked')].map(cb => cb.value);
    if (!workerIds.length) return showToast('Select at least one worker', 'warning');
    const btn = document.getElementById('ab-btn');
    btn.disabled = true;
    try {
      await API.attendance.markAbsent({ workerIds, date: document.getElementById('ab-date').value, notes: document.getElementById('ab-notes').value });
      showToast('Marked absent', 'success');
      closeModal('absent-modal');
      loadToday();
    } catch(e) { showToast(e.message, 'error'); }
    btn.disabled = false;
  }

  function closeModal(id) { document.getElementById(id).style.display = 'none'; }

  async function init() {
    try {
      const data = await API.branches.list();
      const branches = data.branches || [];
      const todaySel = document.getElementById('today-branch');
      const hSel = document.getElementById('h-branch');
      const abSel = document.getElementById('ab-branch');
      branches.forEach(b => {
        todaySel.innerHTML += `<option value="${b._id}">${b.name}</option>`;
        hSel.innerHTML     += `<option value="${b._id}">${b.name}</option>`;
        abSel.innerHTML    += `<option value="${b._id}">${b.name}</option>`;
      });
      if (branches.length) {
        todaySel.value = branches[0]._id;
        loadToday();
      }
    } catch(e) {}
    loadHistory();
  }
  init();
</script>
</body>
</html>
