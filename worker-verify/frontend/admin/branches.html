<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Branches — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Branches</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Branch</button>
      </div>
    </header>
    <main class="page-content">
      <div class="card">
        <div id="branches-list" class="card-body p-0"></div>
      </div>
    </main>
  </div>
</div>

<!-- Branch Modal -->
<div id="branch-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Add Branch</h3>
      <button class="btn btn-icon btn-ghost" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="b-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Branch Name <span class="required">*</span></label>
          <input id="b-name" class="form-control" type="text" placeholder="e.g. Warri Main">
        </div>
        <div class="form-group">
          <label class="form-label">Code <span class="required">*</span></label>
          <input id="b-code" class="form-control" type="text" placeholder="e.g. WR01">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Address</label>
        <input id="b-address" class="form-control" type="text" placeholder="Street address">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input id="b-phone" class="form-control" type="tel">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="b-save-btn" onclick="saveBranch()">Save</button>
    </div>
  </div>
</div>

<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  async function loadBranches() {
    try {
      const data = await API.branches.list();
      const branches = data.branches || [];
      if (!branches.length) {
        document.getElementById('branches-list').innerHTML = '<div class="empty-state">No branches yet. Add your first branch.</div>';
        return;
      }
      const rows = branches.map(b => `
        <div class="list-item">
          <div>
            <div class="fw-600">${b.name} <span class="badge badge-gray">${b.code}</span></div>
            ${b.address ? `<div class="text-muted text-sm">${b.address}</div>` : ''}
            ${b.phone   ? `<div class="text-muted text-sm">${b.phone}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="text-muted text-sm">${b.workerCount || 0} workers</span>
            <button class="btn btn-ghost btn-xs" onclick='editBranch(${JSON.stringify(b)})'>Edit</button>
            <button class="btn btn-danger btn-xs" onclick="deleteBranch('${b._id}')">Delete</button>
          </div>
        </div>`).join('');
      document.getElementById('branches-list').innerHTML = rows;
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openModal(b) {
    document.getElementById('modal-title').textContent = b ? 'Edit Branch' : 'Add Branch';
    document.getElementById('b-id').value      = b?._id || '';
    document.getElementById('b-name').value    = b?.name || '';
    document.getElementById('b-code').value    = b?.code || '';
    document.getElementById('b-address').value = b?.address || '';
    document.getElementById('b-phone').value   = b?.phone || '';
    document.getElementById('branch-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('b-name').focus(), 100);
  }
  function editBranch(b) { openModal(b); }
  function closeModal() { document.getElementById('branch-modal').style.display = 'none'; }

  async function saveBranch() {
    const id   = document.getElementById('b-id').value;
    const name = document.getElementById('b-name').value.trim();
    const code = document.getElementById('b-code').value.trim().toUpperCase();
    if (!name) return showToast('Branch name required', 'warning');
    if (!code) return showToast('Branch code required', 'warning');
    const body = { name, code, address: document.getElementById('b-address').value.trim(), phone: document.getElementById('b-phone').value.trim() };
    const btn = document.getElementById('b-save-btn');
    btn.disabled = true;
    try {
      if (id) await API.branches.update(id, body);
      else    await API.branches.create(body);
      showToast('Branch saved', 'success');
      closeModal();
      loadBranches();
    } catch(e) { showToast(e.message, 'error'); }
    btn.disabled = false;
  }

  async function deleteBranch(id) {
    if (!confirm('Delete this branch? This will fail if workers are assigned.')) return;
    try {
      await API.branches.delete(id);
      showToast('Branch deleted', 'success');
      loadBranches();
    } catch(e) { showToast(e.message, 'error'); }
  }

  loadBranches();
</script>
</body>
</html>
