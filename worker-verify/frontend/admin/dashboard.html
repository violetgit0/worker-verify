<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Dashboard</h1>
      <div class="header-actions">
        <div class="form-group" style="margin:0">
          <select id="branch-filter" class="form-control form-control-sm" onchange="loadDashboard()">
            <option value="">All Branches</option>
          </select>
        </div>
      </div>
    </header>
    <main class="page-content">
      <div id="stats-grid" class="stats-grid"></div>
      <div class="row-2col" style="margin-top:24px;">
        <div class="card">
          <div class="card-header"><h3 class="card-title">Branch Summary</h3></div>
          <div id="branch-table" class="card-body p-0"></div>
        </div>
        <div class="card">
          <div class="card-header"><h3 class="card-title">Recent Clock-ins</h3></div>
          <div id="recent-list" class="card-body p-0"></div>
        </div>
      </div>
    </main>
  </div>
</div>
<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  async function loadDashboard() {
    const branch = document.getElementById('branch-filter').value;
    try {
      const data = await API.dashboard.get(branch ? { branch } : {});
      const s = data.stats;
      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card"><div class="stat-icon stat-icon-blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><div class="stat-body"><div class="stat-value">${s.activeWorkers}</div><div class="stat-label">Active Workers</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg></div><div class="stat-body"><div class="stat-value">${s.todayPresent}</div><div class="stat-label">Present Today</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-amber"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div class="stat-body"><div class="stat-value">${s.todayLate}</div><div class="stat-label">Late Today</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-red"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></div><div class="stat-body"><div class="stat-value">${s.todayAbsent}</div><div class="stat-label">Absent Today</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-red"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div><div class="stat-body"><div class="stat-value">${s.pendingShortages}</div><div class="stat-label">Pending Shortages</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-cyan"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><div class="stat-body"><div class="stat-value">${formatCurrency(s.todaySales)}</div><div class="stat-label">Today's Sales</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-purple"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><div class="stat-body"><div class="stat-value">${formatCurrency(s.monthSales)}</div><div class="stat-label">Month Sales</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-amber"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div class="stat-body"><div class="stat-value">${s.pendingWorkers}</div><div class="stat-label">Pending Workers</div></div></div>
      `;

      // Branch summary table
      const rows = (data.branchSummaries || []).map(b => `
        <tr>
          <td><strong>${b.name}</strong><br><small class="text-muted">${b.code}</small></td>
          <td class="text-center">${b.totalWorkers}</td>
          <td class="text-center">${statusBadge('present').replace('Present', b.present)}</td>
          <td class="text-center">${statusBadge('absent').replace('Absent', b.absent)}</td>
        </tr>`).join('');
      document.getElementById('branch-table').innerHTML = rows ? `
        <table class="table"><thead><tr><th>Branch</th><th class="text-center">Workers</th><th class="text-center">Present</th><th class="text-center">Absent</th></tr></thead><tbody>${rows}</tbody></table>`
        : '<div class="empty-state py-4">No branches yet</div>';

      // Recent activity
      const acts = (data.recentActivity || []).map(a => `
        <div class="list-item">
          <div class="worker-cell">
            ${workerAvatar(a.worker)}
            <div><div class="worker-name">${a.worker?.fullName || '—'}</div><div class="worker-meta">${formatTime(a.clockInTime)}</div></div>
          </div>
          <div>${statusBadge(a.status)}</div>
        </div>`).join('');
      document.getElementById('recent-list').innerHTML = acts || '<div class="empty-state py-4">No activity today</div>';
    } catch(e) {
      showToast(e.message, 'error');
    }
  }

  async function init() {
    try {
      const data = await API.branches.list();
      const sel = document.getElementById('branch-filter');
      (data.branches || []).forEach(b => {
        sel.innerHTML += `<option value="${b._id}">${b.name}</option>`;
      });
    } catch(e) {}
    loadDashboard();
  }
  init();
</script>
</body>
</html>
