<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payroll — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Payroll</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openGenerateModal()">Generate Payroll</button>
      </div>
    </header>
    <main class="page-content">
      <div class="card">
        <div class="card-header filter-bar">
          <select id="f-branch" class="form-control form-control-sm" onchange="load(1)"><option value="">All Branches</option></select>
          <select id="f-month"  class="form-control form-control-sm" onchange="load(1)"></select>
          <select id="f-year"   class="form-control form-control-sm" onchange="load(1)"></select>
          <select id="f-status" class="form-control form-control-sm" onchange="load(1)">
            <option value="">All Status</option>
            <option value="draft">Draft</option>
            <option value="approved">Approved</option>
            <option value="paid">Paid</option>
          </select>
        </div>
        <div id="table-body" class="card-body p-0"></div>
        <div id="pagination" class="card-footer"></div>
      </div>
    </main>
  </div>
</div>

<!-- Generate Modal -->
<div id="gen-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 class="modal-title">Generate Payroll</h3>
      <button class="btn btn-icon btn-ghost" onclick="document.getElementById('gen-modal').style.display='none'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="alert alert-info" style="margin-bottom:16px;">Payroll will be calculated from attendance records for the selected period. Approved shortages will be deducted.</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Branch</label>
          <select id="g-branch" class="form-control"><option value="">All Branches</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Month <span class="required">*</span></label>
          <select id="g-month" class="form-control"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Year <span class="required">*</span></label>
          <select id="g-year" class="form-control"></select>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('gen-modal').style.display='none'">Cancel</button>
      <button class="btn btn-primary" id="gen-btn" onclick="doGenerate()">Generate</button>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="detail-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3 class="modal-title" id="detail-title">Payroll Details</h3>
      <button class="btn btn-icon btn-ghost" onclick="document.getElementById('detail-modal').style.display='none'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="detail-body" class="modal-body"></div>
    <div class="modal-footer" id="detail-footer"></div>
  </div>
</div>

<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  let page = 1;
  const now = new Date();

  function buildMonthYear(selId, defVal) {
    const sel = document.getElementById(selId);
    MONTHS.forEach((m, i) => sel.innerHTML += `<option value="${i+1}" ${i+1===defVal?'selected':''}>${m}</option>`);
  }
  function buildYear(selId, defVal) {
    const sel = document.getElementById(selId);
    for (let y = now.getFullYear(); y >= now.getFullYear()-3; y--)
      sel.innerHTML += `<option value="${y}" ${y===defVal?'selected':''}>${y}</option>`;
  }

  async function load(p = 1) {
    page = p;
    const params = {
      branch: document.getElementById('f-branch').value,
      month:  document.getElementById('f-month').value,
      year:   document.getElementById('f-year').value,
      status: document.getElementById('f-status').value,
      page, limit: 30
    };
    Object.keys(params).forEach(k => !params[k] && delete params[k]);
    try {
      const data = await API.payroll.list(params);
      const rows = (data.payroll || []).map(p => `
        <tr>
          <td>
            <div class="worker-cell">
              ${workerAvatar(p.worker)}
              <a href="/admin/worker-detail.html?id=${p.worker?._id}" class="worker-name">${p.worker?.fullName || '—'}</a>
            </div>
          </td>
          <td>${p.branch?.name || '—'}</td>
          <td>${MONTHS[(p.month||1)-1]} ${p.year}</td>
          <td>${formatCurrency(p.baseSalary)}</td>
          <td>${p.daysWorked}/${p.daysScheduled}</td>
          <td class="text-red">${formatCurrency(p.totalDeductions)}</td>
          <td class="fw-600">${formatCurrency(p.netSalary)}</td>
          <td>${statusBadge(p.status)}</td>
          <td>
            <button class="btn btn-ghost btn-xs" onclick="viewDetail('${p._id}')">View</button>
            ${p.status === 'draft' ? `<button class="btn btn-success btn-xs" onclick="updateStatus('${p._id}','approved')">Approve</button>` : ''}
            ${p.status === 'approved' ? `<button class="btn btn-primary btn-xs" onclick="updateStatus('${p._id}','paid')">Mark Paid</button>` : ''}
          </td>
        </tr>`).join('');
      document.getElementById('table-body').innerHTML = rows ? `<table class="table"><thead><tr><th>Worker</th><th>Branch</th><th>Period</th><th>Base</th><th>Days</th><th>Deductions</th><th>Net Pay</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">No payroll records</div>';
      renderPagination('pagination', page, data.pages || 1, 'load');
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openGenerateModal() {
    document.getElementById('gen-modal').style.display = 'flex';
  }

  async function doGenerate() {
    const branch = document.getElementById('g-branch').value;
    const month  = document.getElementById('g-month').value;
    const year   = document.getElementById('g-year').value;
    const btn = document.getElementById('gen-btn');
    btn.disabled = true; btn.textContent = 'Generating…';
    try {
      const data = await API.payroll.generate({ branch: branch || undefined, month: parseInt(month), year: parseInt(year) });
      showToast(`Generated ${data.count || 0} payroll records`, 'success');
      document.getElementById('gen-modal').style.display = 'none';
      load();
    } catch(e) { showToast(e.message, 'error'); }
    btn.disabled = false; btn.textContent = 'Generate';
  }

  async function viewDetail(id) {
    try {
      const data = await API.payroll.list({ _id: id, limit: 1 });
      const p = (data.payroll || [])[0];
      if (!p) return;
      document.getElementById('detail-title').textContent = `${p.worker?.fullName || '—'} — ${MONTHS[(p.month||1)-1]} ${p.year}`;
      const dedRows = (p.deductions || []).map(d => `<tr><td>${d.type}</td><td>${d.reason || '—'}</td><td class="text-red">${formatCurrency(d.amount)}</td></tr>`).join('');
      document.getElementById('detail-body').innerHTML = `
        <div class="detail-grid">
          <div class="detail-item"><div class="detail-label">Base Salary</div><div class="detail-value">${formatCurrency(p.baseSalary)}</div></div>
          <div class="detail-item"><div class="detail-label">Days Scheduled</div><div class="detail-value">${p.daysScheduled}</div></div>
          <div class="detail-item"><div class="detail-label">Days Worked</div><div class="detail-value">${p.daysWorked}</div></div>
          <div class="detail-item"><div class="detail-label">Days Absent</div><div class="detail-value">${p.daysAbsent}</div></div>
          <div class="detail-item"><div class="detail-label">Days Late</div><div class="detail-value">${p.daysLate}</div></div>
          <div class="detail-item"><div class="detail-label">Net Salary</div><div class="detail-value fw-600">${formatCurrency(p.netSalary)}</div></div>
        </div>
        ${dedRows ? `<h4 style="margin:16px 0 8px;font-size:13px;">Deductions</h4><table class="table"><thead><tr><th>Type</th><th>Reason</th><th>Amount</th></tr></thead><tbody>${dedRows}</tbody></table>` : ''}
        ${p.notes ? `<p class="text-muted text-sm" style="margin-top:12px;">${p.notes}</p>` : ''}
      `;
      document.getElementById('detail-footer').innerHTML = `
        <button class="btn btn-ghost" onclick="document.getElementById('detail-modal').style.display='none'">Close</button>
        ${p.status === 'draft' ? `<button class="btn btn-primary btn-sm" onclick="updateStatus('${p._id}','approved');document.getElementById('detail-modal').style.display='none'">Approve</button>` : ''}
        ${p.status === 'approved' ? `<button class="btn btn-success btn-sm" onclick="updateStatus('${p._id}','paid');document.getElementById('detail-modal').style.display='none'">Mark Paid</button>` : ''}
      `;
      document.getElementById('detail-modal').style.display = 'flex';
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function updateStatus(id, status) {
    try {
      await API.payroll.updateStatus(id, { status });
      showToast(`Status updated to ${status}`, 'success');
      load(page);
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function init() {
    buildMonthYear('f-month', now.getMonth()+1);
    buildYear('f-year', now.getFullYear());
    buildMonthYear('g-month', now.getMonth()+1);
    buildYear('g-year', now.getFullYear());
    try {
      const data = await API.branches.list();
      (data.branches || []).forEach(b => {
        document.getElementById('f-branch').innerHTML += `<option value="${b._id}">${b.name}</option>`;
        document.getElementById('g-branch').innerHTML += `<option value="${b._id}">${b.name}</option>`;
      });
    } catch(e) {}
    load();
  }
  init();
</script>
</body>
</html>
