<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roles — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Roles</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Role</button>
      </div>
    </header>
    <main class="page-content">
      <div class="card">
        <div id="roles-list" class="card-body p-0"></div>
      </div>
    </main>
  </div>
</div>

<!-- Role Modal -->
<div id="role-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Add Role</h3>
      <button class="btn btn-icon btn-ghost" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="role-id">
      <div class="form-group">
        <label class="form-label">Role Name <span class="required">*</span></label>
        <input id="role-name" class="form-control" type="text" placeholder="e.g. Pump Attendant">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input id="role-desc" class="form-control" type="text" placeholder="Optional description">
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <input id="role-color" class="form-control" type="color" value="#2563EB" style="height:40px;padding:4px">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveRole()">Save</button>
    </div>
  </div>
</div>

<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  async function loadRoles() {
    try {
      const data = await API.roles.list();
      const roles = data.roles || [];
      if (!roles.length) {
        document.getElementById('roles-list').innerHTML = '<div class="empty-state">No roles yet. Add your first role.</div>';
        return;
      }
      const rows = roles.map(r => `
        <div class="list-item">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="role-dot" style="background:${r.color}"></div>
            <div>
              <div class="fw-600">${r.name}</div>
              ${r.description ? `<div class="text-muted text-sm">${r.description}</div>` : ''}
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="text-muted text-sm">${r.workerCount || 0} workers</span>
            <button class="btn btn-ghost btn-xs" onclick="editRole(${JSON.stringify(r).replace(/"/g,'&quot;')})">Edit</button>
            <button class="btn btn-danger btn-xs" onclick="deleteRole('${r._id}')">Delete</button>
          </div>
        </div>`).join('');
      document.getElementById('roles-list').innerHTML = rows;
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openModal(role) {
    document.getElementById('modal-title').textContent = role ? 'Edit Role' : 'Add Role';
    document.getElementById('role-id').value    = role?._id || '';
    document.getElementById('role-name').value  = role?.name || '';
    document.getElementById('role-desc').value  = role?.description || '';
    document.getElementById('role-color').value = role?.color || '#2563EB';
    document.getElementById('role-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('role-name').focus(), 100);
  }
  function editRole(r) { openModal(r); }
  function closeModal() { document.getElementById('role-modal').style.display = 'none'; }

  async function saveRole() {
    const id    = document.getElementById('role-id').value;
    const name  = document.getElementById('role-name').value.trim();
    const desc  = document.getElementById('role-desc').value.trim();
    const color = document.getElementById('role-color').value;
    if (!name) return showToast('Role name is required', 'warning');
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    try {
      if (id) await API.roles.update(id, { name, description: desc, color });
      else    await API.roles.create({ name, description: desc, color });
      showToast('Role saved', 'success');
      closeModal();
      loadRoles();
    } catch(e) { showToast(e.message, 'error'); }
    btn.disabled = false;
  }

  async function deleteRole(id) {
    if (!confirm('Delete this role? Workers assigned to it will lose their role.')) return;
    try {
      await API.roles.delete(id);
      showToast('Role deleted', 'success');
      loadRoles();
    } catch(e) { showToast(e.message, 'error'); }
  }

  loadRoles();
</script>
</body>
</html>
