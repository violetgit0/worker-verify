<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Sales — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Daily Sales</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Record Sales</button>
      </div>
    </header>
    <main class="page-content">
      <!-- Summary cards -->
      <div id="summary-cards" class="stats-grid" style="margin-bottom:20px;"></div>

      <div class="card">
        <div class="card-header filter-bar">
          <select id="f-branch" class="form-control form-control-sm" onchange="load(1);loadSummary()"><option value="">All Branches</option></select>
          <input id="f-from" class="form-control form-control-sm" type="date" onchange="load(1);loadSummary()">
          <input id="f-to"   class="form-control form-control-sm" type="date" onchange="load(1);loadSummary()">
        </div>
        <div id="table-body" class="card-body p-0"></div>
        <div id="pagination" class="card-footer"></div>
      </div>
    </main>
  </div>
</div>

<!-- Sales Modal -->
<div id="sales-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3 class="modal-title" id="sales-modal-title">Record Daily Sales</h3>
      <button class="btn btn-icon btn-ghost" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="sm-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Branch <span class="required">*</span></label>
          <select id="sm-branch" class="form-control"></select>
        </div>
        <div class="form-group">
          <label class="form-label">Date <span class="required">*</span></label>
          <input id="sm-date" class="form-control" type="date">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Session Label (optional)</label>
        <input id="sm-session" class="form-control" type="text" placeholder="e.g. Morning, Evening, Day Shift">
      </div>
      <h4 style="font-size:13px;font-weight:600;color:var(--gray-700);margin:16px 0 8px;">Sales Breakdown</h4>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cash Sales (₦)</label>
          <input id="sm-cash" class="form-control" type="number" min="0" step="0.01" value="0" oninput="updateTotal()">
        </div>
        <div class="form-group">
          <label class="form-label">POS Sales (₦)</label>
          <input id="sm-pos" class="form-control" type="number" min="0" step="0.01" value="0" oninput="updateTotal()">
        </div>
        <div class="form-group">
          <label class="form-label">Transfer Sales (₦)</label>
          <input id="sm-transfer" class="form-control" type="number" min="0" step="0.01" value="0" oninput="updateTotal()">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Total Sales</label>
        <div id="sm-total" class="fw-600 text-lg" style="padding:10px 0;">₦0.00</div>
      </div>
      <h4 style="font-size:13px;font-weight:600;color:var(--gray-700);margin:16px 0 8px;">Expenses & Shortages</h4>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Expenses (₦)</label>
          <input id="sm-expenses" class="form-control" type="number" min="0" step="0.01" value="0">
        </div>
        <div class="form-group">
          <label class="form-label">Shortage (₦)</label>
          <input id="sm-shortage" class="form-control" type="number" min="0" step="0.01" value="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Expenses Note</label>
        <input id="sm-exp-note" class="form-control" type="text">
      </div>
      <div class="form-group">
        <label class="form-label">Notes (optional)</label>
        <input id="sm-notes" class="form-control" type="text">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="sm-save-btn" onclick="saveSales()">Save</button>
    </div>
  </div>
</div>

<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  let page = 1;
  let branches = [];

  function updateTotal() {
    const c = parseFloat(document.getElementById('sm-cash').value) || 0;
    const p = parseFloat(document.getElementById('sm-pos').value) || 0;
    const t = parseFloat(document.getElementById('sm-transfer').value) || 0;
    document.getElementById('sm-total').textContent = formatCurrency(c + p + t);
  }

  async function loadSummary() {
    const params = {
      branch: document.getElementById('f-branch').value,
      from:   document.getElementById('f-from').value,
      to:     document.getElementById('f-to').value
    };
    Object.keys(params).forEach(k => !params[k] && delete params[k]);
    try {
      const data = await API.sales.summary(params);
      const s = data.summary || {};
      document.getElementById('summary-cards').innerHTML = `
        <div class="stat-card"><div class="stat-icon stat-icon-cyan"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div><div class="stat-body"><div class="stat-value">${formatCurrency(s.totalSales)}</div><div class="stat-label">Total Sales</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-green"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><div class="stat-body"><div class="stat-value">${formatCurrency(s.cashSales)}</div><div class="stat-label">Cash</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-blue"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div><div class="stat-body"><div class="stat-value">${formatCurrency(s.posSales)}</div><div class="stat-label">POS</div></div></div>
        <div class="stat-card"><div class="stat-icon stat-icon-purple"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div><div class="stat-body"><div class="stat-value">${formatCurrency(s.transferSales)}</div><div class="stat-label">Transfer</div></div></div>
      `;
    } catch(e) {}
  }

  async function load(p = 1) {
    page = p;
    const params = {
      branch: document.getElementById('f-branch').value,
      from:   document.getElementById('f-from').value,
      to:     document.getElementById('f-to').value,
      page, limit: 30
    };
    Object.keys(params).forEach(k => !params[k] && delete params[k]);
    try {
      const data = await API.sales.list(params);
      const rows = (data.sales || []).map(s => `
        <tr>
          <td>${formatDate(s.date)}</td>
          <td>${s.branch?.name || '—'}</td>
          <td>${s.sessionLabel || '—'}</td>
          <td>${formatCurrency(s.cashSales)}</td>
          <td>${formatCurrency(s.posSales)}</td>
          <td>${formatCurrency(s.transferSales)}</td>
          <td class="fw-600">${formatCurrency(s.totalSales)}</td>
          <td>${s.shortageAmount > 0 ? `<span class="badge badge-red">${formatCurrency(s.shortageAmount)}</span>` : '—'}</td>
          <td>${statusBadge(s.status)}</td>
          <td>
            <button class="btn btn-ghost btn-xs" onclick='editSales(${JSON.stringify(s)})'>Edit</button>
            <button class="btn btn-danger btn-xs" onclick="del('${s._id}')">Delete</button>
          </td>
        </tr>`).join('');
      document.getElementById('table-body').innerHTML = rows ? `<table class="table"><thead><tr><th>Date</th><th>Branch</th><th>Session</th><th>Cash</th><th>POS</th><th>Transfer</th><th>Total</th><th>Shortage</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">No sales records found</div>';
      renderPagination('pagination', page, data.pages || 1, 'load');
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openModal(s) {
    document.getElementById('sales-modal-title').textContent = s ? 'Edit Sales Record' : 'Record Daily Sales';
    document.getElementById('sm-id').value       = s?._id || '';
    document.getElementById('sm-branch').value   = s?.branch?._id || s?.branch || '';
    document.getElementById('sm-date').value     = s?.date ? s.date.split('T')[0] : new Date().toISOString().split('T')[0];
    document.getElementById('sm-session').value  = s?.sessionLabel || '';
    document.getElementById('sm-cash').value     = s?.cashSales || 0;
    document.getElementById('sm-pos').value      = s?.posSales || 0;
    document.getElementById('sm-transfer').value = s?.transferSales || 0;
    document.getElementById('sm-expenses').value = s?.expenses || 0;
    document.getElementById('sm-shortage').value = s?.shortageAmount || 0;
    document.getElementById('sm-exp-note').value = s?.expensesNote || '';
    document.getElementById('sm-notes').value    = s?.notes || '';
    updateTotal();
    document.getElementById('sales-modal').style.display = 'flex';
  }
  function editSales(s) { openModal(s); }
  function closeModal() { document.getElementById('sales-modal').style.display = 'none'; }

  async function saveSales() {
    const id     = document.getElementById('sm-id').value;
    const branch = document.getElementById('sm-branch').value;
    const date   = document.getElementById('sm-date').value;
    if (!branch) return showToast('Select a branch', 'warning');
    if (!date)   return showToast('Select a date', 'warning');
    const body = {
      branch, date,
      sessionLabel:  document.getElementById('sm-session').value.trim(),
      cashSales:     parseFloat(document.getElementById('sm-cash').value) || 0,
      posSales:      parseFloat(document.getElementById('sm-pos').value) || 0,
      transferSales: parseFloat(document.getElementById('sm-transfer').value) || 0,
      expenses:      parseFloat(document.getElementById('sm-expenses').value) || 0,
      shortageAmount:parseFloat(document.getElementById('sm-shortage').value) || 0,
      expensesNote:  document.getElementById('sm-exp-note').value.trim(),
      notes:         document.getElementById('sm-notes').value.trim()
    };
    const btn = document.getElementById('sm-save-btn');
    btn.disabled = true;
    try {
      if (id) await API.sales.update(id, body);
      else    await API.sales.create(body);
      showToast('Saved', 'success');
      closeModal();
      load(page);
      loadSummary();
    } catch(e) { showToast(e.message, 'error'); }
    btn.disabled = false;
  }

  async function del(id) {
    if (!confirm('Delete this record?')) return;
    try {
      await API.sales.delete(id);
      showToast('Deleted', 'success');
      load(page);
      loadSummary();
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function init() {
    const today = new Date().toISOString().split('T')[0];
    const d = new Date(); d.setDate(1);
    document.getElementById('f-from').value = d.toISOString().split('T')[0];
    document.getElementById('f-to').value   = today;
    try {
      const data = await API.branches.list();
      branches = data.branches || [];
      const fSel = document.getElementById('f-branch');
      const smSel = document.getElementById('sm-branch');
      branches.forEach(b => {
        fSel.innerHTML  += `<option value="${b._id}">${b.name}</option>`;
        smSel.innerHTML += `<option value="${b._id}">${b.name}</option>`;
      });
    } catch(e) {}
    load();
    loadSummary();
  }
  init();
</script>
</body>
</html>
