<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedules — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Schedules</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Schedule</button>
      </div>
    </header>
    <main class="page-content">
      <div class="card">
        <div id="schedules-list" class="card-body p-0"></div>
      </div>
    </main>
  </div>
</div>

<!-- Schedule Modal -->
<div id="sched-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Add Schedule</h3>
      <button class="btn btn-icon btn-ghost" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="sched-id">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name <span class="required">*</span></label>
          <input id="s-name" class="form-control" type="text" placeholder="e.g. 1-on-1-off Rotation">
        </div>
        <div class="form-group">
          <label class="form-label">Type <span class="required">*</span></label>
          <select id="s-type" class="form-control" onchange="toggleTypeFields()">
            <option value="rotation">Rotation (X days on / Y days off)</option>
            <option value="weekly">Weekly (specific days)</option>
          </select>
        </div>
      </div>

      <div id="rotation-fields">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Days ON</label>
            <input id="s-daysOn" class="form-control" type="number" min="1" value="1">
          </div>
          <div class="form-group">
            <label class="form-label">Days OFF</label>
            <input id="s-daysOff" class="form-control" type="number" min="1" value="1">
          </div>
        </div>
      </div>

      <div id="weekly-fields" style="display:none">
        <div class="form-group">
          <label class="form-label">Work Days</label>
          <div class="day-picker">
            <label class="day-btn"><input type="checkbox" value="0"> Sun</label>
            <label class="day-btn"><input type="checkbox" value="1"> Mon</label>
            <label class="day-btn"><input type="checkbox" value="2"> Tue</label>
            <label class="day-btn"><input type="checkbox" value="3"> Wed</label>
            <label class="day-btn"><input type="checkbox" value="4"> Thu</label>
            <label class="day-btn"><input type="checkbox" value="5"> Fri</label>
            <label class="day-btn"><input type="checkbox" value="6"> Sat</label>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Clock In Time</label>
          <input id="s-clockIn" class="form-control" type="time" value="08:00">
        </div>
        <div class="form-group">
          <label class="form-label">Clock Out Time</label>
          <input id="s-clockOut" class="form-control" type="time" value="17:00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Late After (minutes)</label>
          <input id="s-lateAfter" class="form-control" type="number" min="0" value="0" placeholder="0 = no grace period">
        </div>
        <div class="form-group">
          <label class="form-label">Color</label>
          <input id="s-color" class="form-control" type="color" value="#2563EB" style="height:40px;padding:4px">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="save-btn" onclick="saveSchedule()">Save</button>
    </div>
  </div>
</div>

<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  function toggleTypeFields() {
    const type = document.getElementById('s-type').value;
    document.getElementById('rotation-fields').style.display = type === 'rotation' ? '' : 'none';
    document.getElementById('weekly-fields').style.display   = type === 'weekly'   ? '' : 'none';
  }

  async function loadSchedules() {
    try {
      const data = await API.schedules.list();
      const schedules = data.schedules || [];
      if (!schedules.length) {
        document.getElementById('schedules-list').innerHTML = '<div class="empty-state">No schedules yet.</div>';
        return;
      }
      const rows = schedules.map(s => {
        const typeInfo = s.type === 'rotation'
          ? `${s.daysOn} on / ${s.daysOff} off`
          : (s.workDays || []).map(d => ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d]).join(', ');
        return `
        <div class="list-item">
          <div style="display:flex;align-items:center;gap:12px;">
            <div class="role-dot" style="background:${s.color || '#2563EB'}"></div>
            <div>
              <div class="fw-600">${s.name}</div>
              <div class="text-muted text-sm">${s.type === 'rotation' ? 'Rotation' : 'Weekly'} · ${typeInfo} · In: ${s.clockIn} Out: ${s.clockOut}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:12px;">
            <span class="text-muted text-sm">${s.workerCount || 0} workers</span>
            <button class="btn btn-ghost btn-xs" onclick='editSchedule(${JSON.stringify(s)})'>Edit</button>
            <button class="btn btn-danger btn-xs" onclick="deleteSchedule('${s._id}')">Delete</button>
          </div>
        </div>`;
      }).join('');
      document.getElementById('schedules-list').innerHTML = rows;
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openModal(s) {
    document.getElementById('modal-title').textContent = s ? 'Edit Schedule' : 'Add Schedule';
    document.getElementById('sched-id').value   = s?._id || '';
    document.getElementById('s-name').value     = s?.name || '';
    document.getElementById('s-type').value     = s?.type || 'rotation';
    document.getElementById('s-daysOn').value   = s?.daysOn || 1;
    document.getElementById('s-daysOff').value  = s?.daysOff || 1;
    document.getElementById('s-clockIn').value  = s?.clockIn || '08:00';
    document.getElementById('s-clockOut').value = s?.clockOut || '17:00';
    document.getElementById('s-lateAfter').value = s?.lateAfterMinutes || 0;
    document.getElementById('s-color').value    = s?.color || '#2563EB';
    // Set work days checkboxes
    document.querySelectorAll('.day-btn input').forEach(cb => {
      cb.checked = (s?.workDays || []).includes(parseInt(cb.value));
    });
    toggleTypeFields();
    document.getElementById('sched-modal').style.display = 'flex';
  }
  function editSchedule(s) { openModal(s); }
  function closeModal() { document.getElementById('sched-modal').style.display = 'none'; }

  async function saveSchedule() {
    const id   = document.getElementById('sched-id').value;
    const name = document.getElementById('s-name').value.trim();
    const type = document.getElementById('s-type').value;
    if (!name) return showToast('Schedule name required', 'warning');
    const workDays = [...document.querySelectorAll('.day-btn input:checked')].map(cb => parseInt(cb.value));
    const body = {
      name, type,
      daysOn:  parseInt(document.getElementById('s-daysOn').value)  || 1,
      daysOff: parseInt(document.getElementById('s-daysOff').value) || 1,
      workDays,
      clockIn:  document.getElementById('s-clockIn').value,
      clockOut: document.getElementById('s-clockOut').value,
      lateAfterMinutes: parseInt(document.getElementById('s-lateAfter').value) || 0,
      color: document.getElementById('s-color').value
    };
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    try {
      if (id) await API.schedules.update(id, body);
      else    await API.schedules.create(body);
      showToast('Schedule saved', 'success');
      closeModal();
      loadSchedules();
    } catch(e) { showToast(e.message, 'error'); }
    btn.disabled = false;
  }

  async function deleteSchedule(id) {
    if (!confirm('Delete this schedule?')) return;
    try {
      await API.schedules.delete(id);
      showToast('Deleted', 'success');
      loadSchedules();
    } catch(e) { showToast(e.message, 'error'); }
  }

  loadSchedules();
</script>
</body>
</html>
