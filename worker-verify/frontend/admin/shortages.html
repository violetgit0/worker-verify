<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shortages — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Shortages</h1>
      <div class="header-actions">
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Record Shortage</button>
      </div>
    </header>
    <main class="page-content">
      <div class="card">
        <div class="card-header filter-bar">
          <select id="f-branch" class="form-control form-control-sm" onchange="load(1)"><option value="">All Branches</option></select>
          <select id="f-status" class="form-control form-control-sm" onchange="load(1)">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="approved">Approved</option>
            <option value="rejected">Rejected</option>
          </select>
          <input id="f-from" class="form-control form-control-sm" type="date" onchange="load(1)">
          <input id="f-to"   class="form-control form-control-sm" type="date" onchange="load(1)">
        </div>
        <div id="table-body" class="card-body p-0"></div>
        <div id="pagination" class="card-footer"></div>
      </div>
    </main>
  </div>
</div>

<!-- Record Shortage Modal -->
<div id="sht-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 class="modal-title">Record Shortage</h3>
      <button class="btn btn-icon btn-ghost" onclick="closeModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Worker <span class="required">*</span></label>
        <input id="s-search" class="form-control" type="text" placeholder="Search worker name or phone…" oninput="searchWorkersS()">
        <div id="s-results" class="search-dropdown"></div>
        <input type="hidden" id="s-worker-id">
        <div id="s-worker-name" class="text-muted text-sm" style="margin-top:4px;"></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date <span class="required">*</span></label>
          <input id="s-date" class="form-control" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">Amount (₦) <span class="required">*</span></label>
          <input id="s-amount" class="form-control" type="number" min="0" step="0.01">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Reason</label>
        <input id="s-reason" class="form-control" type="text" placeholder="Brief description">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" id="sht-save-btn" onclick="saveShortage()">Record</button>
    </div>
  </div>
</div>

<!-- Reject Modal -->
<div id="reject-modal" class="modal-overlay" style="display:none">
  <div class="modal-box modal-sm">
    <div class="modal-header">
      <h3 class="modal-title">Reject Shortage</h3>
      <button class="btn btn-icon btn-ghost" onclick="document.getElementById('reject-modal').style.display='none'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="rej-id">
      <div class="form-group">
        <label class="form-label">Rejection Note</label>
        <input id="rej-note" class="form-control" type="text">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('reject-modal').style.display='none'">Cancel</button>
      <button class="btn btn-danger" onclick="doReject()">Reject</button>
    </div>
  </div>
</div>

<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  let page = 1;

  async function load(p = 1) {
    page = p;
    const params = {
      branch: document.getElementById('f-branch').value,
      status: document.getElementById('f-status').value,
      from:   document.getElementById('f-from').value,
      to:     document.getElementById('f-to').value,
      page, limit: 30
    };
    Object.keys(params).forEach(k => !params[k] && delete params[k]);
    try {
      const data = await API.shortages.list(params);
      const rows = (data.shortages || []).map(s => `
        <tr>
          <td>
            <div class="worker-cell">
              ${workerAvatar(s.worker)}
              <div class="worker-name">${s.worker?.fullName || '—'}</div>
            </div>
          </td>
          <td>${s.branch?.name || '—'}</td>
          <td>${formatDate(s.date)}</td>
          <td class="fw-600">${formatCurrency(s.amount)}</td>
          <td>${s.reason || '—'}</td>
          <td>${statusBadge(s.status)}</td>
          <td>
            ${s.status === 'pending' ? `
              <button class="btn btn-success btn-xs" onclick="approve('${s._id}')">Approve</button>
              <button class="btn btn-danger btn-xs" onclick="openReject('${s._id}')">Reject</button>
            ` : ''}
            ${s.status !== 'approved' ? `<button class="btn btn-ghost btn-xs" onclick="del('${s._id}')">Delete</button>` : ''}
          </td>
        </tr>`).join('');
      document.getElementById('table-body').innerHTML = rows ? `<table class="table"><thead><tr><th>Worker</th><th>Branch</th><th>Date</th><th>Amount</th><th>Reason</th><th>Status</th><th></th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state">No shortages found</div>';
      renderPagination('pagination', page, data.pages || 1, 'load');
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openModal() {
    document.getElementById('s-worker-id').value = '';
    document.getElementById('s-worker-name').textContent = '';
    document.getElementById('s-search').value = '';
    document.getElementById('s-results').innerHTML = '';
    document.getElementById('s-date').value = new Date().toISOString().split('T')[0];
    document.getElementById('s-amount').value = '';
    document.getElementById('s-reason').value = '';
    document.getElementById('sht-modal').style.display = 'flex';
  }
  function closeModal() { document.getElementById('sht-modal').style.display = 'none'; }

  const searchWorkersS = debounce(async () => {
    const q = document.getElementById('s-search').value.trim();
    if (q.length < 2) { document.getElementById('s-results').innerHTML = ''; return; }
    try {
      const data = await API.workers.search(q);
      document.getElementById('s-results').innerHTML = (data.workers || []).map(w =>
        `<div class="dropdown-item" onclick="selectS('${w._id}','${w.fullName.replace(/'/g,"\\'")}')">
          ${workerAvatar(w)} <span>${w.fullName}</span></div>`).join('') || '<div class="dropdown-empty">Not found</div>';
    } catch(e) {}
  });
  function selectS(id, name) {
    document.getElementById('s-worker-id').value = id;
    document.getElementById('s-worker-name').textContent = '→ ' + name;
    document.getElementById('s-results').innerHTML = '';
    document.getElementById('s-search').value = name;
  }

  async function saveShortage() {
    const workerId = document.getElementById('s-worker-id').value;
    const amount   = document.getElementById('s-amount').value;
    const date     = document.getElementById('s-date').value;
    if (!workerId) return showToast('Select a worker', 'warning');
    if (!amount || parseFloat(amount) <= 0) return showToast('Enter a valid amount', 'warning');
    const btn = document.getElementById('sht-save-btn');
    btn.disabled = true;
    try {
      await API.shortages.create({ workerId, amount: parseFloat(amount), date, reason: document.getElementById('s-reason').value });
      showToast('Shortage recorded', 'success');
      closeModal();
      load();
    } catch(e) { showToast(e.message, 'error'); }
    btn.disabled = false;
  }

  async function approve(id) {
    if (!confirm('Approve this shortage?')) return;
    try {
      await API.shortages.approve(id);
      showToast('Approved — will apply to payroll', 'success');
      load(page);
    } catch(e) { showToast(e.message, 'error'); }
  }

  function openReject(id) {
    document.getElementById('rej-id').value = id;
    document.getElementById('rej-note').value = '';
    document.getElementById('reject-modal').style.display = 'flex';
  }
  async function doReject() {
    const id   = document.getElementById('rej-id').value;
    const note = document.getElementById('rej-note').value.trim();
    try {
      await API.shortages.reject(id, { rejectionNote: note });
      showToast('Rejected', 'success');
      document.getElementById('reject-modal').style.display = 'none';
      load(page);
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function del(id) {
    if (!confirm('Delete this shortage record?')) return;
    try {
      await API.shortages.delete(id);
      showToast('Deleted', 'success');
      load(page);
    } catch(e) { showToast(e.message, 'error'); }
  }

  async function init() {
    try {
      const data = await API.branches.list();
      (data.branches || []).forEach(b => document.getElementById('f-branch').innerHTML += `<option value="${b._id}">${b.name}</option>`);
    } catch(e) {}
    load();
  }
  init();
</script>
</body>
</html>
