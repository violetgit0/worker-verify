<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Profile — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title" id="page-title">Worker Profile</h1>
      <div class="header-actions">
        <a href="/admin/workers.html" class="btn btn-ghost btn-sm">Back</a>
        <button class="btn btn-primary btn-sm" onclick="openEditModal()">Edit</button>
      </div>
    </header>
    <main class="page-content">
      <div id="profile-section"></div>

      <div class="tabs" style="margin-top:24px;">
        <button class="tab-btn active" onclick="showTab('attendance', this)">Attendance</button>
        <button class="tab-btn" onclick="showTab('payroll', this)">Payroll</button>
        <button class="tab-btn" onclick="showTab('shortages', this)">Shortages</button>
      </div>
      <div id="tab-attendance" class="tab-panel card"><div id="att-content" class="card-body p-0"></div></div>
      <div id="tab-payroll"    class="tab-panel card" style="display:none"><div id="pay-content" class="card-body p-0"></div></div>
      <div id="tab-shortages"  class="tab-panel card" style="display:none"><div id="sht-content" class="card-body p-0"></div></div>
    </main>
  </div>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3 class="modal-title">Edit Worker</h3>
      <button class="btn btn-icon btn-ghost" onclick="closeModal('edit-modal')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="form-label">Full Name</label><input id="e-fullName" class="form-control" type="text"></div>
        <div class="form-group"><label class="form-label">Phone</label><input id="e-phone" class="form-control" type="tel"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Branch</label><select id="e-branch" class="form-control"></select></div>
        <div class="form-group"><label class="form-label">Role</label><select id="e-role" class="form-control"><option value="">No Role</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Schedule</label><select id="e-schedule" class="form-control"><option value="">No Schedule</option></select></div>
        <div class="form-group"><label class="form-label">Schedule Start</label><input id="e-scheduleStartDate" class="form-control" type="date"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Salary (₦)</label><input id="e-salary" class="form-control" type="number" min="0"></div>
        <div class="form-group"><label class="form-label">Status</label>
          <select id="e-status" class="form-control">
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="suspended">Suspended</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">NIN</label><input id="e-nin" class="form-control" type="text"></div>
      <div class="form-group"><label class="form-label">Photo</label><input id="e-photo" class="form-control" type="file" accept="image/*"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('edit-modal')">Cancel</button>
      <button class="btn btn-primary" id="edit-save-btn" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  const wid = new URLSearchParams(location.search).get('id');
  if (!wid) window.location.href = '/admin/workers.html';
  let worker = null;

  function showTab(name, btn) {
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).style.display = '';
    btn.classList.add('active');
    if (name === 'attendance') loadAttendance();
    if (name === 'payroll')    loadPayroll();
    if (name === 'shortages')  loadShortages();
  }

  async function loadWorker() {
    try {
      const data = await API.workers.get(wid);
      worker = data.worker;
      document.getElementById('page-title').textContent = worker.fullName;
      document.getElementById('profile-section').innerHTML = `
        <div class="card">
          <div class="card-body">
            <div class="profile-header">
              ${workerAvatar(worker, 'xl')}
              <div class="profile-info">
                <h2 class="profile-name">${worker.fullName}</h2>
                <p class="profile-meta">${worker.phone} ${worker.nin ? ' · NIN: ' + worker.nin : ''}</p>
                <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
                  ${statusBadge(worker.status)}
                  ${worker.role ? `<span class="badge" style="background:${worker.role.color}20;color:${worker.role.color}">${worker.role.name}</span>` : ''}
                </div>
              </div>
            </div>
            <div class="detail-grid" style="margin-top:20px;">
              <div class="detail-item"><div class="detail-label">Branch</div><div class="detail-value">${worker.branch?.name || '—'}</div></div>
              <div class="detail-item"><div class="detail-label">Schedule</div><div class="detail-value">${worker.schedule?.name || '—'}</div></div>
              <div class="detail-item"><div class="detail-label">Schedule Start</div><div class="detail-value">${formatDate(worker.scheduleStartDate)}</div></div>
              <div class="detail-item"><div class="detail-label">Salary</div><div class="detail-value">${formatCurrency(worker.salary)}/mo</div></div>
              <div class="detail-item"><div class="detail-label">Date Employed</div><div class="detail-value">${formatDate(worker.dateEmployed)}</div></div>
            </div>
          </div>
        </div>`;
      loadAttendance();
    } catch(e) {
      showToast(e.message, 'error');
    }
  }

  async function loadAttendance() {
    const now = new Date();
    try {
      const data = await API.attendance.worker(wid, { month: now.getMonth()+1, year: now.getFullYear(), limit: 35 });
      const rows = (data.attendance || []).map(a => `
        <tr>
          <td>${formatDate(a.date)}</td>
          <td>${statusBadge(a.status)}</td>
          <td>${a.clockInTime ? formatTime(a.clockInTime) : '—'}</td>
          <td>${a.clockOutTime ? formatTime(a.clockOutTime) : '—'}</td>
          <td>${a.latenessMinutes ? formatMinutes(a.latenessMinutes) : '—'}</td>
          <td class="text-muted text-sm">${a.notes || ''}</td>
        </tr>`).join('');
      let summary = '';
      if (data.summary) {
        const s = data.summary;
        summary = `<div class="att-summary"><span class="badge badge-green">Present: ${s.present}</span><span class="badge badge-amber">Late: ${s.late}</span><span class="badge badge-red">Absent: ${s.absent}</span><span class="badge badge-gray">Off Day: ${s.offDay}</span></div>`;
      }
      document.getElementById('att-content').innerHTML = summary + (rows ? `<table class="table"><thead><tr><th>Date</th><th>Status</th><th>Clock In</th><th>Clock Out</th><th>Lateness</th><th>Notes</th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state py-4">No records this month</div>');
    } catch(e) { document.getElementById('att-content').innerHTML = '<div class="empty-state py-4">Failed to load</div>'; }
  }

  async function loadPayroll() {
    try {
      const data = await API.payroll.worker(wid, { limit: 12 });
      const rows = (data.payroll || []).map(p => `
        <tr>
          <td>${new Date(0, p.month-1).toLocaleString('en', {month:'long'})} ${p.year}</td>
          <td>${formatCurrency(p.baseSalary)}</td>
          <td>${p.daysWorked}/${p.daysScheduled}</td>
          <td>${formatCurrency(p.totalDeductions)}</td>
          <td>${formatCurrency(p.netSalary)}</td>
          <td>${statusBadge(p.status)}</td>
        </tr>`).join('');
      document.getElementById('pay-content').innerHTML = rows ? `<table class="table"><thead><tr><th>Period</th><th>Base Salary</th><th>Days</th><th>Deductions</th><th>Net Pay</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state py-4">No payroll records</div>';
    } catch(e) { document.getElementById('pay-content').innerHTML = '<div class="empty-state py-4">Failed to load</div>'; }
  }

  async function loadShortages() {
    try {
      const data = await API.shortages.list({ worker: wid, limit: 20 });
      const rows = (data.shortages || []).map(s => `
        <tr>
          <td>${formatDate(s.date)}</td>
          <td>${formatCurrency(s.amount)}</td>
          <td>${s.reason || '—'}</td>
          <td>${statusBadge(s.status)}</td>
        </tr>`).join('');
      document.getElementById('sht-content').innerHTML = rows ? `<table class="table"><thead><tr><th>Date</th><th>Amount</th><th>Reason</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table>` : '<div class="empty-state py-4">No shortage records</div>';
    } catch(e) { document.getElementById('sht-content').innerHTML = '<div class="empty-state py-4">Failed to load</div>'; }
  }

  let editOptions = {};
  async function openEditModal() {
    if (!worker) return;
    if (!editOptions.branches) {
      const [bData, rData, sData] = await Promise.all([API.branches.list(), API.roles.list(), API.schedules.list()]);
      editOptions = { branches: bData.branches || [], roles: rData.roles || [], schedules: sData.schedules || [] };
      const bSel = document.getElementById('e-branch');
      editOptions.branches.forEach(b => bSel.innerHTML += `<option value="${b._id}">${b.name}</option>`);
      const rSel = document.getElementById('e-role');
      editOptions.roles.forEach(r => rSel.innerHTML += `<option value="${r._id}">${r.name}</option>`);
      const sSel = document.getElementById('e-schedule');
      editOptions.schedules.forEach(s => sSel.innerHTML += `<option value="${s._id}">${s.name}</option>`);
    }
    document.getElementById('e-fullName').value = worker.fullName || '';
    document.getElementById('e-phone').value    = worker.phone || '';
    document.getElementById('e-branch').value   = worker.branch?._id || '';
    document.getElementById('e-role').value     = worker.role?._id || '';
    document.getElementById('e-schedule').value = worker.schedule?._id || '';
    document.getElementById('e-scheduleStartDate').value = worker.scheduleStartDate ? worker.scheduleStartDate.split('T')[0] : '';
    document.getElementById('e-salary').value   = worker.salary || 0;
    document.getElementById('e-status').value   = worker.status || 'active';
    document.getElementById('e-nin').value      = worker.nin || '';
    document.getElementById('edit-modal').style.display = 'flex';
  }

  async function saveEdit() {
    const fd = new FormData();
    fd.append('fullName', document.getElementById('e-fullName').value.trim());
    fd.append('phone', document.getElementById('e-phone').value.trim());
    fd.append('branch', document.getElementById('e-branch').value);
    fd.append('role', document.getElementById('e-role').value);
    fd.append('schedule', document.getElementById('e-schedule').value);
    fd.append('scheduleStartDate', document.getElementById('e-scheduleStartDate').value);
    fd.append('salary', document.getElementById('e-salary').value);
    fd.append('status', document.getElementById('e-status').value);
    fd.append('nin', document.getElementById('e-nin').value.trim());
    const photo = document.getElementById('e-photo').files[0];
    if (photo) fd.append('photo', photo);

    const btn = document.getElementById('edit-save-btn');
    btn.disabled = true; btn.textContent = 'Saving…';
    try {
      await API.workers.update(wid, fd);
      showToast('Worker updated', 'success');
      closeModal('edit-modal');
      loadWorker();
    } catch(e) {
      showToast(e.message, 'error');
    }
    btn.disabled = false; btn.textContent = 'Save Changes';
  }

  function closeModal(id) { document.getElementById(id).style.display = 'none'; }

  loadWorker();
</script>
</body>
</html>
