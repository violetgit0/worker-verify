<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workers – WorkerSave</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
<div class="app-layout">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo"><div class="brand-icon">⚡</div> Sage Energy</div>
    </div>
    <div class="sidebar-user">
      <img id="sidebarAvatar" src="../assets/img/avatar.png" alt="Avatar" class="sidebar-avatar" onerror="this.style.display='none'" />
      <div class="sidebar-user-info">
        <div class="user-name" id="sidebarUserName">Loading…</div>
        <div class="user-role" id="sidebarUserRole"></div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-title">Main</div>
      <a href="dashboard.html"  class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
      <a href="workers.html"    class="nav-link active"><span class="nav-icon">👷</span> Workers</a>
      <a href="branches.html"   class="nav-link"><span class="nav-icon">🏢</span> Branches</a>
      <a href="attendance.html" class="nav-link"><span class="nav-icon">🕐</span> Attendance</a>
      <a href="payroll.html"    class="nav-link"><span class="nav-icon">💰</span> Payroll</a>
      <a href="attendance.html#alerts" class="nav-link"><span class="nav-icon">🚨</span> Security Alerts</a>
      <a href="staff.html"      class="nav-link"><span class="nav-icon">👤</span> Staff Accounts</a>
      <div class="nav-section-title">Worker Entry</div>
      <a href="../staff/register-worker.html" class="nav-link"><span class="nav-icon">➕</span> Register Worker</a>
    </nav>
    <div class="sidebar-footer">
      <button class="logout-btn" onclick="logout()">🚪 Sign Out</button>
    </div>
  </aside>

  <div class="main-content">
    <header class="app-header">
      <div class="flex items-center gap-2">
        <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
        <h1 class="header-title">Workers</h1>
      </div>
      <a href="../staff/register-worker.html" class="btn btn-primary btn-sm">➕ Register Worker</a>
    </header>

    <main class="page-body">
      <div class="card">

        <!-- Search & Filters -->
        <div class="search-bar" style="flex-wrap:wrap;gap:10px;">
          <div class="search-input-wrap" style="flex:1;min-width:220px;">
            <span class="search-icon">🔍</span>
            <input id="searchInput" type="text" class="form-control" placeholder="Search by name, phone, NIN…" />
          </div>
          <div class="filter-group">
            <select id="statusFilter" class="filter-select">
              <option value="all">All Verification</option>
              <option value="pending">Pending</option>
              <option value="verified">Verified</option>
              <option value="rejected">Rejected</option>
            </select>
            <select id="empFilter" class="filter-select">
              <option value="all">All Status</option>
              <option value="active">Active</option>
              <option value="suspended">Suspended</option>
              <option value="on_leave">On Leave</option>
              <option value="resigned">Resigned</option>
              <option value="sacked">Sacked</option>
            </select>
            <select id="branchFilter" class="filter-select">
              <option value="all">All Branches</option>
            </select>
            <select id="shiftFilter" class="filter-select">
              <option value="all">All Shifts</option>
              <option value="A">Shift A</option>
              <option value="B">Shift B</option>
              <option value="unassigned">Unassigned</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="applyFilters()">Search</button>
            <button class="btn btn-outline btn-sm" onclick="clearFilters()">Reset</button>
          </div>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Worker</th>
                <th>Phone</th>
                <th>Branch</th>
                <th>Shift</th>
                <th>Verification</th>
                <th>Status</th>
                <th>Registered</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="workersTable">
              <tr><td colspan="9" style="text-align:center;padding:40px;color:var(--gray-400);">Loading workers…</td></tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div id="pagination" class="pagination"></div>
        <div id="tableSummary" class="text-xs text-muted mt-2"></div>
      </div>
    </main>
  </div>
</div>

<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  const user = requireAuth(['super_admin']);
  let currentPage = 1;
  const pageSize = 20;

  if (user) {
    populateSidebarUser();
    loadBranchOptions();
    // Pre-fill filters from URL params
    const p = new URLSearchParams(window.location.search);
    if (p.get('status')) document.getElementById('statusFilter').value = p.get('status');
    if (p.get('emp'))    document.getElementById('empFilter').value    = p.get('emp');
    if (p.get('branch')) document.getElementById('branchFilter').value = p.get('branch');
    if (p.get('shift'))  document.getElementById('shiftFilter').value  = p.get('shift');
    loadWorkers();
  }

  async function loadBranchOptions() {
    try {
      const res = await API.getBranches();
      const sel = document.getElementById('branchFilter');
      res.branches.forEach(b => {
        const opt = document.createElement('option');
        opt.value = b._id;
        opt.textContent = `${b.name} (${b.code})`;
        sel.appendChild(opt);
      });
    } catch(_) {}
  }

  let searchTimer;
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => { currentPage = 1; loadWorkers(); }, 400);
  });
  ['statusFilter','empFilter','branchFilter','shiftFilter'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => { currentPage = 1; loadWorkers(); });
  });

  function applyFilters() { currentPage = 1; loadWorkers(); }

  function clearFilters() {
    document.getElementById('searchInput').value  = '';
    document.getElementById('statusFilter').value = 'all';
    document.getElementById('empFilter').value    = 'all';
    document.getElementById('branchFilter').value = 'all';
    document.getElementById('shiftFilter').value  = 'all';
    currentPage = 1;
    loadWorkers();
  }

  async function loadWorkers(page = currentPage) {
    currentPage = page;
    const search = document.getElementById('searchInput').value.trim();
    const status = document.getElementById('statusFilter').value;
    const emp    = document.getElementById('empFilter').value;
    const branch = document.getElementById('branchFilter').value;
    const shift  = document.getElementById('shiftFilter').value;

    let qs = `?page=${page}&limit=${pageSize}`;
    if (search) qs += `&search=${encodeURIComponent(search)}`;
    if (status !== 'all') qs += `&status=${status}`;
    if (emp    !== 'all') qs += `&employmentStatus=${emp}`;
    if (branch !== 'all') qs += `&branch=${branch}`;
    if (shift  !== 'all') qs += `&shift=${shift}`;

    try {
      const res = await API.getWorkers(qs);
      renderTable(res.workers);
      renderPagination(res.pagination);
    } catch (err) {
      showToast('Failed to load workers: ' + err.message, 'error');
    }
  }

  function renderTable(workers) {
    const tbody = document.getElementById('workersTable');
    if (!workers.length) {
      tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:40px;">
        <div class="empty-icon">👷</div><p class="text-muted">No workers found</p>
      </td></tr>`;
      return;
    }
    tbody.innerHTML = workers.map((w, i) => `
      <tr>
        <td>${((currentPage - 1) * pageSize) + i + 1}</td>
        <td>
          <div class="flex items-center gap-2">
            ${w.passportPhoto
              ? `<img src="${w.passportPhoto}" style="width:34px;height:34px;border-radius:50%;object-fit:cover;" />`
              : `<div style="width:34px;height:34px;border-radius:50%;background:var(--gray-200);display:flex;align-items:center;justify-content:center;">👤</div>`}
            <div>
              <div class="font-semibold">${w.fullName}</div>
              <div class="text-xs text-muted">${w.gender} &bull; ${w.occupation}</div>
            </div>
          </div>
        </td>
        <td>${w.phone}</td>
        <td>
          ${w.branch
            ? `<div class="font-semibold text-sm">${w.branch.name}</div><span class="branch-card-code">${w.branch.code}</span>`
            : `<span class="text-muted text-xs">—</span>`}
        </td>
        <td>${shiftBadge(w.shift)}</td>
        <td>${statusBadge(w.verificationStatus)}</td>
        <td>${empBadge(w.employmentStatus)}</td>
        <td><div class="text-xs">${formatDate(w.createdAt)}</div></td>
        <td>
          <a href="worker-detail.html?id=${w._id}" class="btn btn-sm btn-outline">View</a>
        </td>
      </tr>
    `).join('');
  }

  function renderPagination({ total, page, pages, limit }) {
    const el = document.getElementById('pagination');
    document.getElementById('tableSummary').textContent =
      `Showing ${Math.min((page-1)*limit+1, total)}–${Math.min(page*limit, total)} of ${total} workers`;

    if (pages <= 1) { el.innerHTML = ''; return; }
    let html = `<button class="page-btn" onclick="loadWorkers(${page-1})" ${page===1?'disabled':''}>‹</button>`;
    for (let p = Math.max(1, page-2); p <= Math.min(pages, page+2); p++) {
      html += `<button class="page-btn ${p===page?'active':''}" onclick="loadWorkers(${p})">${p}</button>`;
    }
    html += `<button class="page-btn" onclick="loadWorkers(${page+1})" ${page===pages?'disabled':''}>›</button>`;
    el.innerHTML = html;
  }

  function shiftBadge(shift) {
    const label = shift === 'unassigned' ? '—' : `Shift ${shift}`;
    return `<span class="shift-badge ${shift}">${label}</span>`;
  }
  function empBadge(s) {
    const labels = { active:'Active', suspended:'Suspended', on_leave:'On Leave', resigned:'Resigned', sacked:'Sacked' };
    return `<span class="emp-badge ${s}">${labels[s] || s}</span>`;
  }
</script>
<script src="../assets/js/theme.js"></script>
</body>
</html>
