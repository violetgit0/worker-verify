<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workers — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="app-layout">
  <aside id="sidebar" class="sidebar"></aside>
  <div id="sidebar-overlay" class="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div class="main-content">
    <header class="app-header">
      <button class="btn btn-icon btn-ghost mobile-menu-btn" onclick="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <h1 class="page-title">Workers</h1>
      <div class="header-actions">
        <a href="/admin/worker-add.html" class="btn btn-primary btn-sm">+ Add Worker</a>
      </div>
    </header>
    <main class="page-content">
      <div class="card">
        <div class="card-header filter-bar">
          <input id="search" class="form-control form-control-sm" type="search" placeholder="Search name, phone, NIN…" oninput="debouncedLoad()">
          <select id="f-branch" class="form-control form-control-sm" onchange="loadWorkers(1)"><option value="">All Branches</option></select>
          <select id="f-role"   class="form-control form-control-sm" onchange="loadWorkers(1)"><option value="">All Roles</option></select>
          <select id="f-status" class="form-control form-control-sm" onchange="loadWorkers(1)">
            <option value="">All Status</option>
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="suspended">Suspended</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <div class="card-body p-0">
          <div id="workers-table"></div>
        </div>
        <div id="pagination" class="card-footer"></div>
      </div>
    </main>
  </div>
</div>
<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script src="/assets/js/sidebar.js?v=6"></script>
<script>
  if (!Auth.requireAuth()) throw '';
  populateSidebarUser();

  let page = 1;

  async function loadWorkers(p = 1) {
    page = p;
    const params = {
      page, limit: 30,
      search: document.getElementById('search').value.trim(),
      branch: document.getElementById('f-branch').value,
      role:   document.getElementById('f-role').value,
      status: document.getElementById('f-status').value
    };
    Object.keys(params).forEach(k => !params[k] && delete params[k]);
    try {
      const data = await API.workers.list(params);
      const workers = data.workers || [];
      if (!workers.length) {
        document.getElementById('workers-table').innerHTML = '<div class="empty-state">No workers found</div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }
      const rows = workers.map(w => `
        <tr>
          <td>
            <div class="worker-cell">
              ${workerAvatar(w)}
              <div>
                <a href="/admin/worker-detail.html?id=${w._id}" class="worker-name">${w.fullName}</a>
                <div class="worker-meta">${w.phone}</div>
              </div>
            </div>
          </td>
          <td>${w.branch?.name || '—'}</td>
          <td>${w.role ? `<span class="badge" style="background:${w.role.color}20;color:${w.role.color}">${w.role.name}</span>` : '—'}</td>
          <td>${w.schedule?.name || '—'}</td>
          <td>${statusBadge(w.status)}</td>
          <td>${formatDate(w.dateEmployed)}</td>
          <td>
            <a href="/admin/worker-detail.html?id=${w._id}" class="btn btn-ghost btn-xs">View</a>
          </td>
        </tr>`).join('');
      document.getElementById('workers-table').innerHTML = `
        <table class="table">
          <thead><tr><th>Worker</th><th>Branch</th><th>Role</th><th>Schedule</th><th>Status</th><th>Employed</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      renderPagination('pagination', page, data.pages, 'loadWorkers');
    } catch(e) {
      showToast(e.message, 'error');
    }
  }

  const debouncedLoad = debounce(() => loadWorkers(1));

  async function init() {
    try {
      const [bData, rData] = await Promise.all([API.branches.list(), API.roles.list()]);
      const bSel = document.getElementById('f-branch');
      (bData.branches || []).forEach(b => bSel.innerHTML += `<option value="${b._id}">${b.name}</option>`);
      const rSel = document.getElementById('f-role');
      (rData.roles || []).forEach(r => rSel.innerHTML += `<option value="${r._id}">${r.name}</option>`);
    } catch(e) {}
    loadWorkers();
  }
  init();
</script>
</body>
</html>
