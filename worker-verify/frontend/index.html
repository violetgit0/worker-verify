<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="login-logo">S</div>
    <h1 class="login-brand-title">Sage Energy</h1>
    <p class="login-brand-sub">Workforce & Operations Management</p>
  </div>
  <div class="login-form-panel">
    <div class="login-card">
      <h2 class="login-title">Sign in</h2>
      <p class="login-sub">Enter your company code to continue</p>

      <div id="step-slug">
        <div class="form-group">
          <label class="form-label">Company Code</label>
          <input id="inp-slug" class="form-control" type="text" placeholder="e.g. sage-energy" autocomplete="organization">
        </div>
        <div id="company-hint" class="alert alert-info" style="display:none;margin-bottom:12px;"></div>
        <button class="btn btn-primary btn-block" onclick="lookupCompany()">Continue</button>
        <p class="login-switch">No account? <a href="/register.html">Register your company</a></p>
      </div>

      <div id="step-login" style="display:none;">
        <div id="company-badge" class="alert alert-info" style="margin-bottom:16px;"></div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input id="inp-username" class="form-control" type="text" placeholder="Your username" autocomplete="username">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="inp-password" class="form-control" type="password" placeholder="Your password" autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-block" id="login-btn" onclick="doLogin()">Sign in</button>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;" onclick="backToSlug()">Back</button>
      </div>
    </div>
  </div>
</div>
<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script>
  if (Auth.getToken()) window.location.href = '/admin/dashboard.html';

  let companySlug = '';

  async function lookupCompany() {
    const slug = document.getElementById('inp-slug').value.trim().toLowerCase();
    if (!slug) return showToast('Enter your company code', 'warning');
    try {
      const data = await API.auth.lookup(slug);
      companySlug = slug;
      document.getElementById('company-badge').innerHTML = `<strong>${data.company.name}</strong>`;
      document.getElementById('step-slug').style.display = 'none';
      document.getElementById('step-login').style.display = '';
      document.getElementById('inp-username').focus();
    } catch(e) {
      showToast(e.message || 'Company not found', 'error');
    }
  }

  function backToSlug() {
    document.getElementById('step-slug').style.display = '';
    document.getElementById('step-login').style.display = 'none';
  }

  async function doLogin() {
    const username = document.getElementById('inp-username').value.trim();
    const password = document.getElementById('inp-password').value;
    if (!username || !password) return showToast('Fill in all fields', 'warning');
    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const data = await API.auth.login({ companySlug, username, password });
      Auth.saveSession(data.token, data.user);
      window.location.href = '/admin/dashboard.html';
    } catch(e) {
      showToast(e.message || 'Login failed', 'error');
      btn.disabled = false; btn.textContent = 'Sign in';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      if (document.getElementById('step-login').style.display === 'none') lookupCompany();
      else doLogin();
    }
  });
</script>
</body>
</html>
