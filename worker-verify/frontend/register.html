<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Sage Energy</title>
  <link rel="stylesheet" href="/assets/css/style.css?v=6">
</head>
<body>
<div class="login-wrap">
  <div class="login-brand">
    <div class="login-logo">S</div>
    <h1 class="login-brand-title">Sage Energy</h1>
    <p class="login-brand-sub">Workforce & Operations Management</p>
  </div>
  <div class="login-form-panel">
    <div class="login-card">
      <h2 class="login-title">Create account</h2>
      <p class="login-sub">Set up your company on Sage Energy</p>

      <div class="form-group">
        <label class="form-label">Company Name</label>
        <input id="inp-company" class="form-control" type="text" placeholder="Sage Energy Ltd">
      </div>
      <div class="form-group">
        <label class="form-label">Company Slug <span class="text-muted" style="font-weight:400">(unique code, lowercase)</span></label>
        <input id="inp-slug" class="form-control" type="text" placeholder="sage-energy">
      </div>
      <div class="form-group">
        <label class="form-label">Your Full Name</label>
        <input id="inp-name" class="form-control" type="text" placeholder="John Doe">
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <input id="inp-username" class="form-control" type="text" placeholder="admin">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input id="inp-password" class="form-control" type="password" placeholder="Min 6 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Phone (optional)</label>
        <input id="inp-phone" class="form-control" type="tel" placeholder="+234...">
      </div>
      <button class="btn btn-primary btn-block" id="reg-btn" onclick="doRegister()">Create Account</button>
      <p class="login-switch" style="margin-top:16px;">Already registered? <a href="/index.html">Sign in</a></p>
    </div>
  </div>
</div>
<script src="/assets/js/config.js?v=6"></script>
<script src="/assets/js/api.js?v=6"></script>
<script src="/assets/js/auth.js?v=6"></script>
<script>
  document.getElementById('inp-company').addEventListener('input', function() {
    const slug = this.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    document.getElementById('inp-slug').value = slug;
  });

  async function doRegister() {
    const companyName = document.getElementById('inp-company').value.trim();
    const companySlug = document.getElementById('inp-slug').value.trim();
    const fullName    = document.getElementById('inp-name').value.trim();
    const username    = document.getElementById('inp-username').value.trim();
    const password    = document.getElementById('inp-password').value;
    const phone       = document.getElementById('inp-phone').value.trim();
    if (!companyName || !companySlug || !fullName || !username || !password) {
      return showToast('Fill in all required fields', 'warning');
    }
    const btn = document.getElementById('reg-btn');
    btn.disabled = true; btn.textContent = 'Creating…';
    try {
      const data = await API.auth.register({ companyName, companySlug, fullName, username, password, phone });
      Auth.saveSession(data.token, data.user);
      showToast('Account created!', 'success');
      setTimeout(() => window.location.href = '/admin/dashboard.html', 1000);
    } catch(e) {
      showToast(e.message || 'Registration failed', 'error');
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }
</script>
</body>
</html>
